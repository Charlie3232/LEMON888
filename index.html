/* 光影層：青綠光暈佈滿整個畫面（上中下都有）*/
#app::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(135% 120% at 50% 50%,transparent 55%,rgba(0,0,0,.45) 100%)}
.topbar,.scroll,.tabbar,.modal{position:relative;z-index:1}

/* 固定頂列 */
.topbar{flex-shrink:0;padding:max(14px,env(safe-area-inset-top)) 20px 12px;display:flex;align-items:center;justify-content:space-between;background:transparent;z-index:5}
.topbar .title{font-size:22px;font-weight:700}
.topbar .gear,.topbar .back{width:38px;height:38px;border-radius:12px;background:var(--glass);border:1px solid var(--glassb);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;cursor:pointer}
.topbar .gear svg,.topbar .back svg{width:20px;height:20px;stroke:var(--ink)}
.topbar .addchip{display:inline-flex;align-items:center;gap:5px;background:var(--btnTex);color:#08201d;font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.topbar .addchip svg{width:15px;height:15px;stroke:#08201d}

/* 中間捲動區 */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 18px 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* 固定底部 Tab */
.tabbar{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;padding:10px 8px max(22px,env(safe-area-inset-bottom));background:rgba(10,22,20,.5);backdrop-filter:blur(22px);border-top:1px solid var(--glassb);position:relative;z-index:6}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;opacity:.5;cursor:pointer;border:none;background:none;color:var(--ink);font-family:inherit}
.tab.on{opacity:1;color:var(--coral3)}
.tab svg{width:23px;height:23px;stroke:currentColor;fill:none}
.addbtn{width:54px;height:54px;border-radius:50%;background:var(--btnTex);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(0,0,0,.4);margin-top:-20px;cursor:pointer;border:1px solid rgba(255,255,255,.18);position:relative;z-index:7;color:#fff}
.addbtn svg{width:26px;height:26px;stroke:#6a3828;fill:none}

/* 卡片 */

/* 紅色（支出/負債）維持柔紅 */
.red{background:none;-webkit-text-fill-color:var(--red);color:var(--red)}
.donut{width:120px;height:120px;margin:0 auto}
/* 啟動畫面 splash（像微信進入） */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,#c0392b 0%,#a02718 60%,#7d1c10 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease;gap:22px}
#splash.hide{opacity:0;pointer-events:none}
#splash .logo{width:128px;height:128px;border-radius:30px;box-shadow:0 12px 40px rgba(0,0,0,.35);animation:splashpop .6s cubic-bezier(.34,1.4,.5,1)}
#splash .title{color:#f8e8c8;font-size:24px;font-weight:700;letter-spacing:2px;animation:splashfade .8s ease .2s both}
#splash .foot{position:absolute;bottom:max(46px,env(safe-area-inset-bottom));color:rgba(248,232,200,.6);font-size:13px;font-weight:500;animation:splashfade .8s ease .4s both}
@keyframes splashpop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes splashfade{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.splashload{display:flex;gap:8px;margin-top:6px;animation:splashfade .8s ease .3s both}
.splashdot{width:9px;height:9px;border-radius:50%;background:#f8e8c8;opacity:.5;animation:splashdot 1s ease-in-out infinite}
.splashdot:nth-child(2){animation-delay:.2s}.splashdot:nth-child(3){animation-delay:.4s}
@keyframes splashdot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>
<div id="app" class="bookmode">
  <div class="loading" id="loading"><div class="spinner"></div><div style="color:var(--sub);font-size:13px;font-weight:700">載入中…</div></div>

  <!-- 頂列 -->
  <div class="topbar">
    <div class="title" id="topTitle">記帳本</div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="addchip" id="topAdd" style="display:none" onclick="onTopAdd()"><svg viewBox="0 0 24 24" stroke-width="2.4" stroke-linecap="round" fill="none"><path d="M12 5v14M5 12h14"/></svg>新增</div>
      <div class="gear" onclick="openStats()"><svg viewBox="0 0 24 24" stroke-width="2" fill="none"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg></div>
      <div class="gear" onclick="openSettings()"><svg viewBox="0 0 24 24" stroke-width="2" fill="none"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.4 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.4-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.4 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg></div>
    </div>
  </div>

  <!-- 內容 -->
  <div class="scroll" id="scroll">
    <!-- 主頁 -->
    <div class="page" id="page-home"></div>
    <!-- 記帳本 -->
    <div class="page on" id="page-book"></div>
    <!-- 存款 -->
    <div class="page" id="page-bank"></div>
    <!-- 投資 -->
    <div class="page" id="page-invest"></div>
  </div>

  <!-- 底部 Tab -->
  <div class="tabbar">
    <button class="tab" data-page="home" onclick="switchPage('home')"><svg viewBox="0 0 24 24" stroke-width="2.2"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>主頁</button>
    <button class="tab on" data-page="book" onclick="switchPage('book')"><svg viewBox="0 0 24 24" stroke-width="2.2"><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2zM9 3v16"/></svg>記帳本</button>
    <button class="addbtn" onclick="openAddTxn()"><svg viewBox="0 0 24 24" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    <button class="tab" data-page="bank" onclick="switchPage('bank')"><svg viewBox="0 0 24 24" stroke-width="2.2"><path d="M3 9l9-6 9 6M4 9v10h16V9M9 19v-6h6v6"/></svg>存款</button>
    <button class="tab" data-page="invest" onclick="switchPage('invest')"><svg viewBox="0 0 24 24" stroke-width="2.2"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>投資</button>
  </div>

  <!-- 各種全頁彈窗掛這 -->
  <div id="modalHost"></div>
  <div class="toast" id="toast"></div>
</div>

<div id="splash">
  <img class="logo" src="iicon-192.png" alt="">
  <div class="title">小檸檬的記帳APP</div>
  <div class="splashload"><div class="splashdot"></div><div class="splashdot"></div><div class="splashdot"></div></div>
  <div class="foot" id="splashFoot">財神保佑・載入中…</div>
</div>

<script>
const APP_VERSION = 'v2026.06.05-loan-manual';
console.log('小檸檬的記帳APP 版本：' + APP_VERSION);
const API_URL = 'https://script.google.com/macros/s/AKfycbzGiIDIF6L-lJYYUnYqiwytrOjtZb2wyZbBzOi4kC0eMa5USfK_JleMhubZHucHki_pUQ/exec';

let DB = null;             // 全部資料
let curPage = 'book';
let bookDate = todayStr(); // 記帳本選定日期
let calYear, calMonth;     // 月曆顯示年月

// ---------- 工具 ----------
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function dkey(v){ // 把任何日期字串正規化成 yyyy-MM-dd
  let s=String(v||'').trim();
  let m=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(m) return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
  return s.slice(0,10);
}
function fmt(n){ n=Number(n)||0; return n.toLocaleString('en-US',{maximumFractionDigits:0}); }
function fmtSign(n){ n=Number(n)||0; return (n>=0?'+':'')+fmt(n); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---------- API ----------
async function apiGet(action){
  const r = await fetch(API_URL+'?action='+action);
  return await r.json();
}
let _posting = false;
async function apiPost(action, extra){
  if(_posting){ return {ok:false, error:'busy'}; } // 防連點/重送
  _posting = true;
  try{
    const r = await fetch(API_URL, {
      method:'POST',
      redirect:'follow',
      body: JSON.stringify(Object.assign({action}, extra)),
      headers:{'Content-Type':'text/plain;charset=utf-8'} // 避免 CORS preflight
    });
    return await r.json();
  } finally {
    _posting = false;
  }
}

async function loadAll(){
  const res = await apiGet('all');
  if(res.ok){ DB = res.data; renderAll(); switchPage('book'); }
  else { toast('載入失敗'); console.error(res.error); }
  document.getElementById('loading').style.display='none';
}

// ---------- emoji 庫（70+） ----------
const EMOJIS = ['🍽️','🍜','🍱','🍔','🍕','🍰','🍹','☕','🛒','🛍️','👕','👟','💄','🧴','🚆','🚗','🚕','⛽','✈️','🚲','🅿️','🏠','🏡','🏘️','💡','📺','🛋️','🔧','📱','💻','📞','📶','🎮','🎬','🎤','💊','🦷','🏥','💉','🧘','💆','🏆','📖','🎓','📚','✏️','💼','📄','⚖️','💰','💵','💸','💳','🏦','🪙','📈','🎁','🧧','🎉','🐶','🐱','🌳','🌸','🍑','🚬','💎','👶','🎵','⭐','☂️','⚽'];

// ---------- 計算 ----------
function totals(){
  let cash=0, investCash=0, accLoan=0;
  DB.accounts.forEach(a=>{
    if(String(a.archived)==='true'||a.archived===true) return;
    if(String(a.exclude)==='true'||a.exclude===true) return;
    const bal=Number(a.balance)||0, ty=a.type;
    if(ty==='cash'||ty==='bank') cash+=bal;
    else if(ty==='broker'||ty==='wealth') investCash+=bal;
    else if(ty==='credit'||ty==='borrow') accLoan+=Math.abs(bal);
    else if(ty==='lend') cash+=bal;
    else cash+=bal;
  });
  let stock=0,etf=0,fund=0,cost=0;
  DB.holdings.forEach(h=>{ if(h.type==='stock')stock+=h.marketValue; else if(h.type==='etf')etf+=h.marketValue; else if(h.type==='fund')fund+=h.marketValue; cost+=h.costValue; });
  let loan=accLoan; DB.loans.forEach(l=>{ if(String(l.active)!=='false') loan+=Number(l.remainingBalance)||0; });
  const holdingValue=stock+etf+fund;
  const invest=holdingValue+investCash;   // 投資含證券/理財閒置現金
  return {cash,investCash,stock,etf,fund,invest,holdingValue,cost,loan,assets:cash+invest,pl:holdingValue-cost};
}
function monthTotals(ym){ // ym='2026-06'
  let inc=0,exp=0;
  DB.transactions.forEach(t=>{ if(dkey(t.date).slice(0,7)===ym){ if(t.type==='income')inc+=Number(t.amount)||0; else if(t.type==='expense')exp+=Number(t.amount)||0; } });
  return {inc,exp,net:inc-exp};
}
function dayTotals(d){
  let inc=0,exp=0;
  DB.transactions.forEach(t=>{ if(dkey(t.date)===d){ if(t.type==='income')inc+=Number(t.amount)||0; else if(t.type==='expense')exp+=Number(t.amount)||0; } });
  return {inc,exp,net:inc-exp};
}
function catMap(){ const m={}; DB.categories.forEach(c=>m[c.category_id]=c); return m; }
function accMap(){ const m={}; DB.accounts.forEach(a=>m[a.account_id]=a); return m; }

// ---------- 渲染：全部 ----------
function renderAll(){ renderHome(); renderBook(); renderBank(); renderInvest(); }

// 主頁
function renderHome(){
  const t=totals();
  const ym=todayStr().slice(0,7);
  const mt=monthTotals(ym);
  const snaps=DB.snapshots.slice().sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  // 趨勢 sparkline
  let spark='';
  if(snaps.length>1){
    const vals=snaps.map(s=>Number(s.total_assets)||0);
    const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
    const pts=vals.map((v,i)=>{ const x=i/(vals.length-1)*100; const y=58-((v-min)/rng*52); return x.toFixed(1)+','+y.toFixed(1); }).join(' ');
    spark=`<svg viewBox="0 0 100 64" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="#a6ccc0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  } else spark='<div style="color:#7a6258;font-size:11px;text-align:center;padding-top:22px">資料累積中，明天起顯示趨勢</div>';

  // 月增減%
  let chg='—';
  if(snaps.length>1){ const a=Number(snaps[snaps.length-2].total_assets)||0, b=Number(snaps[snaps.length-1].total_assets)||0; if(a>0)chg=((b-a)/a*100).toFixed(1)+'%'; }

  let loansHtml = DB.loans.filter(l=>String(l.active)!=='false').map(l=>`
    <div class="lrow"><div class="ico">${l.icon||'💳'}</div>
      <div class="nm">${esc(l.name)}<small>利率 ${l.rate}% · 月繳 ${fmt(l.monthlyPayment)} · 剩 ${l.remainingMonths} 期</small></div>
      <div class="amt red">${fmt(l.remainingBalance)}</div></div>`).join('') || '<div class="empty">無貸款</div>';

  document.getElementById('page-home').innerHTML=`
    <div class="hero">
      <div class="label">淨資產 Net Worth</div>
      <div class="big">$${fmt(t.assets)}</div>
      <div class="sub"><span class="up">↑ ${chg} 本月</span></div>
      <div class="trend">${spark}</div>
    </div>
    <div class="card"><h3>資產總覽</h3>
      <div class="grid5">
        <div class="mbox"><div class="l">總資產</div><div class="v green">${fmt(t.assets)}</div></div>
        <div class="mbox" onclick="switchPage('bank')"><div class="l">總存款</div><div class="v green">${fmt(t.cash)}</div></div>
        <div class="mbox" onclick="switchPage('invest')"><div class="l">股票</div><div class="v green">${fmt(t.stock)}</div></div>
        <div class="mbox" onclick="switchPage('invest')"><div class="l">ETF</div><div class="v green">${fmt(t.etf)}</div></div>
        <div class="mbox" onclick="switchPage('invest')"><div class="l">基金</div><div class="v green">${fmt(t.fund)}</div></div>
      </div>
    </div>
    <div class="card"><h3>貸款餘額 <span class="red">${fmt(t.loan)}</span></h3>${loansHtml}</div>
    <div class="card"><h3>本月收支</h3>
      <div class="summary" style="margin:0">
        <div class="sbox"><div class="l">收入</div><div class="v green">${fmtSign(mt.inc)}</div></div>
        <div class="sbox"><div class="l">支出</div><div class="v red">−${fmt(mt.exp)}</div></div>
        <div class="sbox"><div class="l">結餘</div><div class="v ${mt.net>=0?'green':'red'}">${fmtSign(mt.net)}</div></div>
      </div>
    </div>`;
}

// 記帳本
function renderBook(){
  const cm=catMap();
  const d=new Date(bookDate); if(calYear==null){ calYear=d.getFullYear(); calMonth=d.getMonth(); }
  const ds=dayTotals(bookDate);
  // 月曆
  const first=new Date(calYear,calMonth,1); const startW=first.getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const prevDays=new Date(calYear,calMonth,0).getDate();
  const recDates={}; DB.transactions.forEach(t=>{ recDates[dkey(t.date)]=true; });
  let cells='';
  for(let i=0;i<42;i++){
    let dd,cls='d',ymd;
    if(i<startW){ dd=prevDays-startW+1+i; cls+=' mute'; const m=calMonth-1; ymd=cellYmd(calYear,m,dd); }
    else if(i<startW+daysInMonth){ dd=i-startW+1; ymd=cellYmd(calYear,calMonth,dd);
      if(ymd===todayStr())cls+=' today'; if(ymd===bookDate)cls+=' act'; if(recDates[ymd])cls+=' dot'; }
    else { dd=i-startW-daysInMonth+1; cls+=' mute'; ymd=cellYmd(calYear,calMonth+1,dd); }
    cells+=`<div class="${cls}" onclick="pickDate('${ymd}')">${dd}</div>`;
    if(i>=startW+daysInMonth && (i-startW-daysInMonth+1)>=7 && i%7===6) {} // 不提早結束，固定 6 列
  }
  // 當日記錄
  const recs=DB.transactions.filter(t=>dkey(t.date)===bookDate).sort((a,b)=>String(b.created_at).localeCompare(String(a.created_at)));
  let recHtml=recs.map(t=>{
    const c=cm[t.category_id]||{}; const isInc=t.type==='income';
    return `<div class="lrow" onclick="openEditTxn('${t.txn_id}')"><div class="ico">${c.icon||(isInc?'💰':'💸')}</div>
      <div class="nm">${esc(c.name||t.note||'未分類')}<small>${esc(t.note||'')}</small></div>
      <div class="amt ${isInc?'green':'red'}">${isInc?'+':'−'}${fmt(t.amount)}</div></div>`;
  }).join('') || '<div class="empty">這天還沒有記錄</div>';

  document.getElementById('page-book').innerHTML=`
    <div class="card calwrap">
      <div class="calhead"><button onclick="calNav(-1)">‹</button><span>${calYear} 年 ${calMonth+1} 月</span><button onclick="calNav(1)">›</button></div>
      <div class="cal">
        <div class="h">日</div><div class="h">一</div><div class="h">二</div><div class="h">三</div><div class="h">四</div><div class="h">五</div><div class="h">六</div>
        ${cells}
      </div>
    </div>
    <div class="summary compact">
      <div class="sbox"><div class="l">收入</div><div class="v green">${fmtSign(ds.inc)}</div></div>
      <div class="sbox"><div class="l">支出</div><div class="v red">${ds.exp?('−'+fmt(ds.exp)):'0'}</div></div>
      <div class="sbox"><div class="l">合計</div><div class="v ${ds.net>=0?'green':'red'}">${fmtSign(ds.net)}</div></div>
    </div>
    <div class="reclabel"><span>${bookDate} 當日記錄</span><span>${recs.length} 筆</span></div>
    <div class="reclist">${recHtml}</div>`;
}
function cellYmd(y,m,d){ const dt=new Date(y,m,d); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function pickDate(ymd){ bookDate=ymd; renderBook(); }
function calNav(dir){ calMonth+=dir; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderBook(); }

// 存款
const TYPE_LABEL={cash:'現金',bank:'銀行',broker:'證券戶',wealth:'理財帳戶',credit:'信用卡',borrow:'借入',lend:'借出'};
function renderBank(){
  const t=totals();
  const all=DB.accounts.filter(a=>String(a.archived)!=='true').sort((a,b)=>(Number(a.sort)||0)-(Number(b.sort)||0));
  const depositAccs=all.filter(a=>['cash','bank','lend'].includes(a.type)||!a.type);
  const investAccs =all.filter(a=>['broker','wealth'].includes(a.type));
  const debtAccs   =all.filter(a=>['credit','borrow'].includes(a.type));
  // 環圈（只用存款帳戶）
  let donut='', off=0; const total=t.cash||1;
  const cols=['#c06b54','#d27a62','#e29a82','#a8857a','#8a766e','#6f8a6a'];
  depositAccs.forEach((a,i)=>{ if(String(a.exclude)==='true')return; const pct=(Number(a.balance)||0)/total*100; const dash=Math.max(0,pct)*2.51; donut+=`<circle cx="60" cy="60" r="40" fill="none" stroke="${cols[i%cols.length]}" stroke-width="16" stroke-dasharray="${dash} 251" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`; off+=dash; });
  const rowHtml=(a,arr,i)=>{ const bal=Number(a.balance)||0;
    if(bankSortMode){
      return `<div class="lrow"><div class="ico">${a.icon||'🏦'}</div>
        <div class="nm">${esc(a.name)}<small>${TYPE_LABEL[a.type]||'未分類'}</small></div>
        <div style="display:flex;gap:6px">
          <button class="sortbtn" ${i===0?'disabled':''} onclick="moveAcc('${a.account_id}',-1)">▲</button>
          <button class="sortbtn" ${i===arr.length-1?'disabled':''} onclick="moveAcc('${a.account_id}',1)">▼</button>
        </div></div>`;
    }
    return `<div class="lrow" onclick="openEditAccount('${a.account_id}')"><div class="ico">${a.icon||'🏦'}</div>
    <div class="nm">${esc(a.name)}<small>${TYPE_LABEL[a.type]||'未分類'}${(String(a.exclude)==='true')?' · 不計入':''}</small></div>
    <div class="amt ${bal>=0?'green':'red'}">${fmt(bal)}</div></div>`; };
  const depList=depositAccs.length?depositAccs.map((a,i)=>rowHtml(a,depositAccs,i)).join(''):'<div class="empty">尚無帳戶</div>';
  const invList=investAccs.length?investAccs.map((a,i)=>rowHtml(a,investAccs,i)).join(''):'';
  const debtList=debtAccs.length?debtAccs.map((a,i)=>rowHtml(a,debtAccs,i)).join(''):'';
  document.getElementById('page-bank').innerHTML=`
    <div class="card"><h3>總存款</h3>
      <div style="text-align:center;padding:8px 0"><div class="big ${t.cash>=0?'green':'red'}" style="font-size:38px;font-family:Outfit;font-weight:700">$${fmt(t.cash)}</div></div>
    </div>
    <div class="card"><h3>存款帳戶 <button class="save" style="font-size:12px;padding:4px 12px" onclick="toggleBankSort()">${bankSortMode?'完成':'排序'}</button></h3>${depList}</div>
    ${invList?`<div class="card"><h3>投資帳戶 <span style="color:var(--sub);font-weight:500">閒置現金 ${fmt(t.investCash)}</span></h3>${invList}</div>`:''}
    ${debtList?`<div class="card"><h3>信用卡 / 借入（負債）</h3>${debtList}</div>`:''}`;
}
let bankSortMode=false;
function toggleBankSort(){ bankSortMode=!bankSortMode; renderBank(); }
async function moveAcc(id,dir){
  const all=DB.accounts.filter(a=>String(a.archived)!=='true').sort((a,b)=>(Number(a.sort)||0)-(Number(b.sort)||0));
  const dep=all.filter(a=>['cash','bank','lend'].includes(a.type)||!a.type);
  const i=dep.findIndex(a=>String(a.account_id)===String(id));
  if(i<0) return; const j=i+dir; if(j<0||j>=dep.length) return;
  // 交換順序
  [dep[i],dep[j]]=[dep[j],dep[i]];
  const ids=dep.map(a=>a.account_id);
  // 本地先更新順序讓畫面即時反應
  dep.forEach((a,k)=>{ const orig=DB.accounts.find(x=>x.account_id===a.account_id); if(orig)orig.sort=k+1; });
  renderBank();
  await apiPost('reorderAccounts',{ids});
}

// 投資
let investTab='all';
function renderInvest(){
  const t=totals();
  let hs=DB.holdings.filter(h=>String(h.active)!=='false');
  if(investTab!=='all') hs=hs.filter(h=>h.type===investTab);
  const plPct=t.cost>0?(t.pl/t.cost*100):0;
  let list=hs.sort((a,b)=>(a.sort||0)-(b.sort||0)).map(h=>{
    const up=h.pl>=0;

// ========== 全頁彈窗框架 ==========
function openModal(html, anim){
  const host=document.getElementById('modalHost');
  const div=document.createElement('div');
  div.className='modal'+(anim?(' anim-'+anim):''); div.innerHTML=html;
  host.appendChild(div);
  requestAnimationFrame(()=>div.classList.add('show'));
  return div;
}
function closeModal(el){ el.classList.remove('show'); el.style.pointerEvents='none'; setTimeout(()=>el.remove(),440); }

function dispDate(d){ const x=new Date(dkey(d)); if(isNaN(x))return dkey(d); const wd='日一二三四五六'[x.getDay()]; return `${x.getFullYear()}年${x.getMonth()+1}月${x.getDate()}日 週${wd}`; }
function accName(id){ const a=accMap()[id]; return a?(a.icon?a.icon+' ':'')+esc(a.name):'選擇'; }
function memName(id){ const m=(DB.members||[]).find(x=>String(x.member_id)===String(id)); return m?((m.icon||'👤')+' '+esc(m.name)):'選擇'; }

// 分類選擇頁（全頁）
function openCatPicker(){
  const cats=DB.categories.filter(c=>c.type===txnDraft.type&&String(c.archived)!=='true').sort((a,b)=>(a.sort||0)-(b.sort||0));
  const grid=cats.map(c=>`<div class="cbox" onclick="pickCat('${c.category_id}','${c.icon}','${esc(c.name)}')"><div class="e">${c.icon}</div><div class="t">${esc(c.name)}</div></div>`).join('')||'<div class="empty">先到設定新增分類</div>';
  openModal(`
    <div class="mtop"><button class="x" style="width:auto;white-space:nowrap;font-size:15px" onclick="closeTopModal()">‹ 返回</button><div class="t">選擇分類</div><span style="width:40px"></span></div>

function pickCat(id,icon,name){
  txnDraft.category_id=id;
  const el=document.getElementById('catPickTxt'); if(el){ el.classList.remove('ph'); el.innerHTML=esc(name)+' <span class="ar">›</span>'; }
  const row=document.getElementById('txnCatRow'); if(row){ const ti=row.querySelector('.ti'); if(ti) ti.textContent=icon; }
  // 副業相關 / 小樣兒園藝：自動帶帳戶第一銀行、成員小樣兒園藝（方便輸入）
  if(name && (name.indexOf('副業')>=0 || name.indexOf('小樣兒')>=0)){
    const bank=DB.accounts.find(a=>a.name&&a.name.indexOf('第一銀行')>=0);
    const mem=(DB.members||[]).find(m=>m.name&&m.name.indexOf('小樣兒')>=0);
    if(bank){ txnDraft.account_id=bank.account_id; const sa=document.getElementById('txnAcc'); if(sa){sa.value=bank.account_id;syncSel('txnAcc');} }
    if(mem){ txnDraft.member_id=mem.member_id; const sm=document.getElementById('txnMem'); if(sm){sm.value=mem.member_id;syncSel('txnMem');} }
  }
  closeTopModal();
}
function closeTopModal(){ const ms=document.querySelectorAll('.modal'); if(ms.length) closeModal(ms[ms.length-1]); if(document.querySelectorAll('.modal').length<=1){} }
function showSaving(msg){ let el=document.getElementById('savingMask'); if(!el){ el=document.createElement('div'); el.id='savingMask'; el.className='savingmask'; el.innerHTML='<div class="savingbox"><div class="spinner"></div><div id="savingTxt"></div></div>'; document.getElementById('app').appendChild(el); } document.getElementById('savingTxt').textContent=msg||'處理中…'; el.classList.add('show'); }
function hideSaving(){ const el=document.getElementById('savingMask'); if(el)el.classList.remove('show'); }
function delConfirm(msg){ const p=prompt((msg||'確定刪除？')+'\n請輸入密碼確認：'); if(p===null)return false; if(p!=='1309'){ toast('密碼錯誤'); return false; } return true; }
let _kpTouched=false;
function kpT(e,k){ e.preventDefault(); _kpTouched=true; kp(k); setTimeout(()=>{_kpTouched=false;},400); }
function kpC(k){ if(_kpTouched)return; kp(k); } // 桌機點擊；觸控已處理過就略過
function kp(k){ let a=txnDraft.amount; if(k==='c')a='0'; else if(k==='b')a=a.length>1?a.slice(0,-1):'0'; else { a=(a==='0')?k:a+k; } txnDraft.amount=a; const el=document.getElementById('amtDisp'); if(el)el.textContent=fmt(a); }
async function saveTxn(edit){
  if(!txnDraft.amount||Number(txnDraft.amount)<=0){ toast('請輸入金額'); return; }
  if(txnDraft.type!=='transfer'&&!txnDraft.category_id){ toast('請選分類'); return; }
  if(txnDraft.type==='transfer'){
    if(!txnDraft.to_account_id) txnDraft.to_account_id=document.getElementById('txnToAcc')?.value||'';
    if(txnDraft.account_id===txnDraft.to_account_id){ toast('轉出轉入不能同一帳戶'); return; }
  }
  const payload={type:txnDraft.type,amount:Number(txnDraft.amount),category_id:txnDraft.category_id,account_id:txnDraft.account_id,to_account_id:txnDraft.to_account_id||'',date:txnDraft.date,note:txnDraft.note,member_id:txnDraft.member_id||''};
  showSaving('新增中…');
  let res;
  if(edit){ payload.txn_id=txnDraft.txn_id; res=await apiPost('updateTxn',{payload}); }
  else res=await apiPost('addTxn',{payload});
  hideSaving();
  if(res.ok){ closeAllModal(); await loadAll(); toast('已儲存'); } else toast('失敗');
}
async function delTxn(id){ if(!delConfirm())return; const res=await apiPost('deleteTxn',{id}); if(res.ok){ closeAllModal(); await loadAll(); toast('已刪除'); } }

function setHoldType(t,btn){
  holdDraft.type=t;
  // 同步已填欄位
  syncHoldDraft();
  closeModal(document.querySelectorAll('.modal')[document.querySelectorAll('.modal').length-1]);
  renderHoldModal(holdDraft.holding_id?'編輯持倉':'新增持倉', !!holdDraft.holding_id);
}
function setBuyMode(m){
  holdDraft.buy_mode=m;
  syncHoldDraft();
  closeModal(document.querySelectorAll('.modal')[document.querySelectorAll('.modal').length-1]);
  renderHoldModal(holdDraft.holding_id?'編輯持倉':'新增持倉', !!holdDraft.holding_id);
}
function syncHoldDraft(){
  // 把目前畫面上的輸入值存回 draft（切換時不遺失）
  const g=id=>{const e=document.getElementById(id);return e?e.value:undefined;};
  if(g('hSym')!==undefined)holdDraft.symbol=g('hSym');
  if(g('hUid')!==undefined)holdDraft.fund_uid=g('hUid');
  if(g('hName')!==undefined)holdDraft.name=g('hName');
  if(g('hShares')!==undefined)holdDraft.shares=g('hShares');
  if(g('hCost')!==undefined)holdDraft.avg_cost=g('hCost');
  if(g('hAmt')!==undefined)holdDraft.invest_amount=g('hAmt');
  if(g('hDate')!==undefined)holdDraft.buy_date=g('hDate');
  if(g('hDcaAmt')!==undefined)holdDraft.dca_amount=g('hDcaAmt');
  if(g('hDcaDay')!==undefined)holdDraft.dca_day=g('hDcaDay');
  if(g('hAcc')!==undefined)holdDraft.account_id=g('hAcc');
  if(g('hDcaAcc')!==undefined)holdDraft.dca_account=g('hDcaAcc');
}
async function saveHold(edit){
  syncHoldDraft();
  const type=holdDraft.type;
  const p={type:type,symbol:holdDraft.symbol.trim(),fund_uid:(holdDraft.fund_uid||'').trim(),name:holdDraft.name.trim(),account_id:holdDraft.account_id,currency:'TWD',active:true};
  if(!p.symbol||!p.name){ toast('請填代號和名稱'); return; }
  if(type==='stock'){
    p.shares=Number(holdDraft.shares)||0; p.avg_cost=Number(holdDraft.avg_cost)||0; p.buy_mode='single';
  }else{
    p.buy_mode=holdDraft.buy_mode;
    if(holdDraft.buy_mode==='dca'){
      p.dca_amount=Number(holdDraft.dca_amount)||0;
      p.dca_day=Number(holdDraft.dca_day)||1;
      p.dca_account=holdDraft.dca_account;
      if(!p.dca_amount){ toast('請填每期扣款金額'); return; }
    }else{
      // 單筆
      if(type==='etf'){
        p.shares=Number(holdDraft.shares)||0; p.avg_cost=Number(holdDraft.avg_cost)||0;
        p.buy_date=holdDraft.buy_date;
        if(!p.shares||!p.avg_cost){ toast('請填股數和成交價'); return; }
      }else{
        p.invest_amount=Number(holdDraft.invest_amount)||0;
        p.buy_date=holdDraft.buy_date;
        if(!p.invest_amount){ toast('請填投入金額'); return; }
      }
    }
  }
  toast('儲存中…');
  let res;
  if(edit){ p.holding_id=holdDraft.holding_id; res=await apiPost('updateHolding',{payload:p}); }
  else { p.sort=DB.holdings.length+1; res=await apiPost('addHolding',{payload:p}); }
  if(res.ok){ closeAllModal(); await loadAll(); toast('已儲存'); } else toast('儲存失敗');
}
async function delHold(id){ if(!delConfirm())return; const res=await apiPost('deleteHolding',{id}); if(res.ok){ closeAllModal(); await loadAll(); toast('已刪除'); } }

// 支出：紅粉橘莫蘭迪系
// 莫蘭迪多色系（色相分散，相鄰差異明顯，但都低飽和柔和）
const STAT_EXP_COLORS=['#c97a6d','#b59ac4','#d4a85e','#8aa3b8','#cf8fa8','#9aae84','#dba07a','#a890b0','#c4b06a','#7fa898'];
const STAT_INC_COLORS=['#7a9a6e','#8aa3c4','#c4b87a','#b59ac4','#d49a8a','#9ab0a0','#c4a06a','#8fb0c0','#aab084','#cf9ab0'];
function statColors(){ return statTab==='income'?STAT_INC_COLORS:STAT_EXP_COLORS; }
let statYear, statMonth, statTab='expense', statSub='category';
function openStats(){
  const d=new Date(); if(statYear==null){ statYear=d.getFullYear(); statMonth=d.getMonth()+1; }
  openModal(`<div class="mtop"><button class="x" onclick="closeModal(this.closest('.modal'))">✕</button><div class="t">統計分析</div><span style="width:30px"></span></div>
    <div class="mscroll" id="statBody"></div>`);
  renderStats();
}
function statYM(){ return statYear+'-'+String(statMonth).padStart(2,'0'); }
function statNav(dir){ statMonth+=dir; if(statMonth<1){statMonth=12;statYear--;} if(statMonth>12){statMonth=1;statYear++;} renderStats(); }
function setStatTab(t){ statTab=t; if(t!=='trend'&&statSub==='trend')statSub='category'; renderStats(); }
function setStatSub(s){ statSub=s; renderStats(); }

function renderStats(){
  const body=document.getElementById('statBody'); if(!body)return;
  const cm=catMap(), am=accMap();
  const ym=statYM();
  // 篩出當月該類型交易
  const txns=DB.transactions.filter(t=>dkey(t.date).slice(0,7)===ym && t.type===(statTab==='trend'?'expense':statTab));

  let inner='';
  // 年月選擇器
  inner+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px">
    <button class="kpbtn" onclick="statNav(-1)" style="border:none;background:rgba(255,255,255,.08);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;color:var(--ink)">‹</button>
    <b style="font-size:17px">${statYear} 年 ${statMonth} 月</b>
    <button class="kpbtn" onclick="statNav(1)" style="border:none;background:rgba(255,255,255,.08);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;color:var(--ink)">›</button></div>`;

  // 大分頁：支出/收入/趨勢
  inner+=`<div class="segtab">
    <button class="${statTab==='expense'?'on':''}" onclick="setStatTab('expense')">支出</button>
    <button class="${statTab==='income'?'on':''}" onclick="setStatTab('income')">收入</button>
    <button class="${statTab==='trend'?'on':''}" onclick="setStatTab('trend')">趨勢</button></div>`;

  if(statTab==='trend'){
    inner+=renderTrend();
  } else {
    // 小分頁：類別/帳戶/成員
    inner+=`<div class="segtab" style="background:rgba(255,255,255,.05)">
      <button class="${statSub==='category'?'on':''}" onclick="setStatSub('category')">類別比</button>
      <button class="${statSub==='account'?'on':''}" onclick="setStatSub('account')">帳戶比</button>
      <button class="${statSub==='member'?'on':''}" onclick="setStatSub('member')">成員比</button></div>`;
    // 依小分頁分組
    let groups={};
    txns.forEach(t=>{
      let key,label,icon;
      if(statSub==='category'){ const c=cm[t.category_id]||{}; key=t.category_id||'none'; label=c.name||'未分類'; icon=c.icon||'❓'; }
      else if(statSub==='account'){ const a=am[t.account_id]||{}; key=t.account_id||'none'; label=a.name||'未知'; icon=a.icon||'🏦'; }
      else { const mid=t.member_id||'none'; const mm=(DB.members||[]).find(x=>String(x.member_id)===String(mid)); key=mid; label=mm?mm.name:'未指定'; icon=mm?(mm.icon||'👤'):'👤'; }
      if(!groups[key]) groups[key]={label,icon,amt:0};
      groups[key].amt+=Number(t.amount)||0;
    });
    const arr=Object.values(groups).sort((a,b)=>b.amt-a.amt);
    const total=arr.reduce((s,g)=>s+g.amt,0);
    const cols=statColors();
    inner+=`<div class="card">${donutChart(arr,total)}${arr.length?arr.map((g,i)=>{
      const pct=total>0?(g.amt/total*100):0;
      return `<div class="lrow"><div class="ico" style="background:${cols[i%cols.length]}22;border-color:${cols[i%cols.length]}">${g.icon}</div><div class="nm">${esc(g.label)}<small>${pct.toFixed(1)}%</small></div><div class="amt ${statTab==='income'?'green':'red'}">${fmt(g.amt)}</div></div>`;
    }).join(''):'<div class="empty">本月無資料</div>'}</div>`;
  }
  body.innerHTML=inner;
}

function donutChart(arr,total){
  if(!total) return '<div class="empty">本月無資料</div>';
  const cols=statColors();
  let off=0, segs='';
  arr.forEach((g,i)=>{ const pct=g.amt/total; const dash=pct*314; segs+=`<circle cx="60" cy="60" r="50" fill="none" stroke="${cols[i%cols.length]}" stroke-width="18" stroke-dasharray="${dash} ${314-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 60 60)"/>`; off+=dash; });
  // 小圖例（最多顯示前 6 項）
  const legend=arr.slice(0,6).map((g,i)=>{ const pct=total>0?(g.amt/total*100):0; return `<div style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;margin-bottom:5px"><span style="width:10px;height:10px;border-radius:3px;background:${cols[i%cols.length]};flex-shrink:0"></span><span style="flex:1;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g.label)}</span><span style="color:var(--sub)">${pct.toFixed(0)}%</span></div>`; }).join('');
  return `<div style="display:flex;align-items:center;gap:14px;padding:6px 0 14px">
    <svg viewBox="0 0 120 120" style="width:130px;height:130px;flex-shrink:0">${segs}<circle cx="60" cy="60" r="40" fill="#13302d"/><text x="60" y="56" text-anchor="middle" font-size="9" fill="var(--sub)">總計</text><text x="60" y="73" text-anchor="middle" font-size="14" font-weight="700" fill="var(--ink)" font-family="Outfit">${fmt(total)}</text></svg>
    <div style="flex:1;min-width:0">${legend}</div>
  </div>`;
}

function renderTrend(){
  const months=[];
  let y=statYear, mo=statMonth;
  for(let i=5;i>=0;i--){ let yy=y, mm=mo-i; while(mm<1){mm+=12;yy--;} months.push(yy+'-'+String(mm).padStart(2,'0')); }
  const data=months.map(ym=>{ const mt=monthTotals(ym); return {ym,inc:mt.inc,exp:mt.exp,net:mt.inc-mt.exp}; });
  const max=Math.max(1,...data.map(d=>Math.max(d.inc,d.exp)));
  // 折線：淨收支，範圍含負值
  const nets=data.map(d=>d.net);
  const nmax=Math.max(1,...nets), nmin=Math.min(0,...nets), nrng=(nmax-nmin)||1;
  const H=150, W=320, n=data.length, LEFT=40;
  const px=i=>LEFT+(n>1?(i/(n-1)):0.5)*(W-LEFT-16);
  const py=v=>H-8-((v-nmin)/nrng*(H-24));
  const linePts=nets.map((v,i)=>`${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  const dots=nets.map((v,i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(v).toFixed(1)}" r="4" fill="var(--ink)"/>`).join('');
  // Y 軸刻度（依 max 分 4 段，取整到漂亮數字）
  function niceNum(x){ if(x<=0)return 0; const e=Math.pow(10,Math.floor(Math.log10(x))); const f=x/e; const nf=f<1.5?1:f<3?2:f<7?5:10; return nf*e; }
  const step=niceNum(max/4)||1; const top=Math.ceil(max/step)*step;
  let yaxis=''; let grid='';
  for(let v=0; v<=top+0.5; v+=step){
    const yy=(H-8-(v/max*(H-24))).toFixed(1);
    const lbl=v>=10000?(v/10000)+'萬':v>=1000?(v/1000)+'K':v;
    yaxis+=`<text x="${LEFT-5}" y="${(+yy+3).toFixed(1)}" text-anchor="end" font-size="8" fill="#a8968e" font-family="Outfit">${lbl}</text>`;
    grid+=`<line x1="${LEFT}" y1="${yy}" x2="${W-4}" y2="${yy}" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`;
  }
  // 長條
  const bw=(W-LEFT-16)/n*0.42;
  const bars=data.map((d,i)=>{
    const cx=px(i);
    const ih=d.inc/max*(H-24), eh=d.exp/max*(H-24);
    return `<rect x="${(cx-bw-1).toFixed(1)}" y="${(H-8-ih).toFixed(1)}" width="${bw.toFixed(1)}" height="${ih.toFixed(1)}" rx="2" fill="#a6ccc0"/>
            <rect x="${(cx+1).toFixed(1)}" y="${(H-8-eh).toFixed(1)}" width="${bw.toFixed(1)}" height="${eh.toFixed(1)}" rx="2" fill="#d4897a"/>`;
  }).join('');
  const labels=data.map((d,i)=>`<text x="${px(i).toFixed(1)}" y="${H+12}" text-anchor="middle" font-size="9" fill="#8a766e" font-weight="700">${d.ym.slice(5)}月</text>`).join('');

  // 累計總收支
  let cum=0; const cumData=data.map(d=>{ cum+=d.net; return cum; });

  return `<div class="card"><h3>近 6 個月收支趨勢</h3>
    <svg viewBox="0 0 ${W} ${H+20}" style="width:100%">
      ${grid}${yaxis}
      ${bars}
      <polyline points="${linePts}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${dots}
      ${labels}
    </svg>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:12px;font-weight:700;flex-wrap:wrap">
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#a6ccc0;margin-right:4px"></span>收入</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#d4897a;margin-right:4px"></span>支出</span>
      <span><span style="display:inline-block;width:14px;height:3px;background:#3a2c2a;margin-right:4px;vertical-align:middle"></span>淨收支</span></div></div>
    <div class="card"><h3>每月明細</h3>
      ${data.slice().reverse().map((d,idx)=>{
        const totalCum=cumData[data.length-1-idx];
        return `<div style="padding:12px 0;border-bottom:1px solid var(--line)">
          <div style="font-weight:700;font-size:15px;margin-bottom:6px">${d.ym}</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;font-weight:700">
            <div style="color:var(--sub)">收入 <span class="green">+${fmt(d.inc)}</span></div>
            <div style="color:var(--sub)">支出 <span class="red">−${fmt(d.exp)}</span></div>
            <div style="color:var(--sub)">本月收支 <span class="${d.net>=0?'green':'red'}">${fmtSign(d.net)}</span></div>
            <div style="color:var(--sub)">累計總收支 <span class="${totalCum>=0?'green':'red'}">${fmtSign(totalCum)}</span></div>
          </div></div>`;
      }).join('')}
    </div>`;
}

function openTutorial(){ tutSec=0; tutStep=0; renderTut(); }
function renderTut(){
  const sec=TUTSEC[tutSec], st=sec.steps[tutStep];
  const totalSteps=sec.steps.length;
  // 大項分頁
  const tabs=TUTSEC.map((s,i)=>`<button class="ttabbtn ${i===tutSec?'on':''}" onclick="tutGo(${i},0)">${s.name}</button>`).join('');
  // 子步驟圓點
  const dots=sec.steps.map((_,i)=>`<span class="tdot ${i===tutStep?'on':''}"></span>`).join('');
  const html=`<div class="mtop"><button class="x" onclick="closeModal(this.closest('.modal'))">✕</button><div class="t">使用教學</div><span style="width:30px"></span></div>
    <div class="mscroll tutscroll">
      <div class="ttabs">${tabs}</div>
      <div class="tutmockwrap">${tutMock(SCR[st.scr], st.hl)}</div>
      <div class="tutstepbox">
        <div class="tutstepno">${tutSec+1}-${tutStep+1}</div>
        <div class="tutsteptxt">${st.t}</div>
      </div>
      <div class="tdots">${dots}</div>
      <div class="tutnav">
        <button class="bigbtn ghost" ${(tutSec===0&&tutStep===0)?'disabled':''} onclick="tutPrev()">‹ 上一步</button>
        ${(tutSec===TUTSEC.length-1&&tutStep===totalSteps-1)?`<button class="bigbtn" onclick="closeAllModal()">完成 ✓</button>`:`<button class="bigbtn" onclick="tutNext()">下一步 ›</button>`}
      </div>
    </div>`;
  const existing=document.querySelector('.modal.tutmodal');
  if(existing){ existing.innerHTML=html; }
  else { const m=openModal(html); m.classList.add('tutmodal'); }
}
function tutGo(s,st){ tutSec=s; tutStep=st; renderTut(); }
function tutNext(){ const n=TUTSEC[tutSec].steps.length; if(tutStep<n-1)tutStep++; else if(tutSec<TUTSEC.length-1){tutSec++;tutStep=0;} renderTut(); }
function tutPrev(){ if(tutStep>0)tutStep--; else if(tutSec>0){tutSec--;tutStep=TUTSEC[tutSec].steps.length-1;} renderTut(); }

// ---------- 啟動 ----------
const splashStart = Date.now();
let _splashGone = false;
function hideSplash(){ if(_splashGone) return; _splashGone=true; document.getElementById('loading').style.display='none'; const sp=document.getElementById('splash'); if(sp){ sp.classList.add('hide'); setTimeout(()=>sp.remove(),500); } }
loadAll().then(()=>{
  const foot=document.getElementById('splashFoot'); if(foot)foot.textContent='財神保佑・記帳理財';
  // 資料載完才淡出 splash（至少停 1.2 秒讓動畫播完），淡出時 loading 已隱藏，不會再看到轉圈
  const wait = Math.max(0, 1200 - (Date.now()-splashStart));
  setTimeout(hideSplash, wait);
}).catch(()=>{ setTimeout(hideSplash, 1200); });
setTimeout(hideSplash, 8000); // 保險：最長 8 秒一定淡出
