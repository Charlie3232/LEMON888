<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c0392b"/>
      <stop offset="0.6" stop-color="#a02718"/>
      <stop offset="1" stop-color="#7d1c10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5d97a"/>
      <stop offset="0.5" stop-color="#e8b84a"/>
      <stop offset="1" stop-color="#c8962a"/>
    </linearGradient>
    <linearGradient id="goldHat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8e08c"/>
      <stop offset="1" stop-color="#d4a23a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#ffe9a8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffe9a8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景圓角方 -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>
  <circle cx="256" cy="214" r="190" fill="url(#glow)"/>

  <!-- 元寶（底部） -->
  <g>
    <ellipse cx="256" cy="430" rx="108" ry="34" fill="#caa033"/>
    <path d="M150 420 q106 -54 212 0 q-36 26 -106 26 q-70 0 -106 -26 z" fill="url(#gold)"/>
    <path d="M196 408 q60 -30 120 0 q-22 -34 -60 -34 q-38 0 -60 34 z" fill="#f5d97a"/>
  </g>

  <!-- 財神身體（紅袍金邊） -->
  <path d="M256 196
           q86 0 104 86
           l14 84
           q-58 26 -118 26
           q-60 0 -118 -26
           l14 -84
           q18 -86 104 -86 z" fill="url(#gold)"/>
  <path d="M256 210
           q72 0 88 74
           l10 70
           q-46 20 -98 20
           q-52 0 -98 -20
           l10 -70
           q16 -74 88 -74 z" fill="#b5281a"/>
  <!-- 衣襟金紋 -->
  <path d="M256 214 l34 26 l-34 120 l-34 -120 z" fill="url(#gold)"/>
  <circle cx="256" cy="300" r="13" fill="#e8b84a"/>

  <!-- 臉 -->
  <circle cx="256" cy="150" r="62" fill="#f3d6b0"/>
  <!-- 笑眼 -->
  <path d="M226 146 q12 -12 24 0" stroke="#5a3a28" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M262 146 q12 -12 24 0" stroke="#5a3a28" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 笑嘴 -->
  <path d="M236 172 q20 22 40 0" stroke="#a0432e" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 鬍鬚 -->
  <path d="M256 178 q-8 40 -22 58 M256 178 q8 40 22 58" stroke="#fbfbfb" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- 財神帽 -->
  <path d="M196 120 q60 -54 120 0 q-10 -52 -60 -52 q-50 0 -60 52 z" fill="url(#goldHat)"/>
  <rect x="238" y="64" width="36" height="22" rx="6" fill="#c0392b" stroke="url(#gold)" stroke-width="4"/>
  <circle cx="256" cy="58" r="11" fill="#f5d97a"/>

  <!-- 金幣「財」字章 -->
  <circle cx="372" cy="330" r="46" fill="url(#gold)" stroke="#a0712a" stroke-width="4"/>
  <circle cx="372" cy="330" r="34" fill="none" stroke="#a0712a" stroke-width="3"/>
  <!-- 中央方孔錢造型，金幣感 -->
  <rect x="360" y="318" width="24" height="24" rx="3" fill="#9a2a18"/>
  <rect x="366" y="324" width="12" height="12" rx="2" fill="url(#gold)"/>
</svg>
